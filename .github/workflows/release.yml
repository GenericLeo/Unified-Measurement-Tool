name: Build Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os_name }} package
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            os_name: Windows
            artifact_suffix: Windows
            pyinstaller_args: --onefile --windowed
            asset_extension: exe
          - runner: macos-latest
            os_name: macOS
            artifact_suffix: macOS
            pyinstaller_args: --windowed
            asset_extension: dmg

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION=$(python - <<'PY'
from version import __version__
print(__version__)
PY
)
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build application with PyInstaller
        shell: bash
        run: |
          pyinstaller ${{ matrix.pyinstaller_args }} \
            --name "Unified-Measurement-Tool" \
            --clean \
            main_app.py

      - name: Package Windows executable
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $asset = "Unified-Measurement-Tool-$version-Windows.exe"
          Copy-Item "dist/Unified-Measurement-Tool.exe" $asset

      - name: Package macOS application
        if: runner.os == 'macOS'
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          APP_NAME="Unified-Measurement-Tool.app"
          DMG_NAME="Unified-Measurement-Tool-${VERSION}-macOS.dmg"
          mkdir -p dmg-root
          cp -R "dist/${APP_NAME}" dmg-root/
          ln -s /Applications dmg-root/Applications
          hdiutil create -volname "Unified Measurement Tool" \
            -srcfolder dmg-root \
            -ov -format UDZO \
            "$DMG_NAME"

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Unified-Measurement-Tool-${{ steps.version.outputs.version }}-${{ matrix.artifact_suffix }}.${{ matrix.asset_extension }}