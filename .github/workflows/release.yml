name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build .app with PyInstaller
        run: |
          pyinstaller --windowed \
            --name "Unified-Measurement-Tool" \
            --clean \
            main_app.py

      - name: Create DMG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DMG="dist/Unified-Measurement-Tool-${VERSION}-macOS.dmg"
          hdiutil create \
            -volname "Unified Measurement Tool" \
            -srcfolder "dist/Unified-Measurement-Tool.app" \
            -ov -format UDZO \
            "$DMG"
          echo "DMG_PATH=$DMG" >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: ${{ env.DMG_PATH }}

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build .exe with PyInstaller
        run: |
          pyinstaller --onefile --windowed \
            --name "Unified-Measurement-Tool" \
            --clean \
            main_app.py

      - name: Rename artifact
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mv dist/Unified-Measurement-Tool.exe "dist/Unified-Measurement-Tool-${VERSION}-Windows.exe"
          echo "EXE_NAME=Unified-Measurement-Tool-${VERSION}-Windows.exe" >> "$GITHUB_ENV"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/${{ env.EXE_NAME }}

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-dmg
          path: artifacts/

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-exe
          path: artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "Unified Measurement Tool ${{ github.ref_name }}"
          body: |
            ## Unified Measurement Tool ${{ github.ref_name }}

            ### Downloads
            | Platform | File |
            |----------|------|
            | macOS    | `.dmg` — open and move the app as needed |
            | Windows  | `.exe` — run directly |

            ### Update notes
            The application can check for updates automatically on startup and will prefer the correct installer for the current operating system.
          files: artifacts/*
          draft: false
          prerelease: false